[package]
name = "tt_shim"
version = "0.1.0"
edition = "2024"

[lib]
# cdylib/staticlib: produces the shared/static library used by C callers.
# rlib: allows the fuzz target (and future Rust unit tests) to link
#       the pure-Rust logic (message encoding, pattern matching) directly.
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
libc = "0.2"
ctor = "0.9"
zbus        = "5"
serde       = "1.0"
log         = "0.4"
env_logger  = "0.11"
