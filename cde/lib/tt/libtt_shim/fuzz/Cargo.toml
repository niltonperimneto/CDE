[package]
name = "tt-shim-fuzz"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = { version = "0.4", features = ["arbitrary-derive"] }
tt_shim = { path = ".." }
arbitrary = { version = "1", features = ["derive"] }

[[bin]]
name = "fuzz_message_encoding"
path = "fuzz_targets/fuzz_message_encoding.rs"
