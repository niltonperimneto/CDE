[package]
name = "dtsearch_rs"
version = "0.1.0"
edition = "2021"

[lib]
# staticlib: produces the .a used by C callers.
# rlib: allows the fuzz target (and future Rust tests) to link against
#       the pure-Rust modules (QueryParser, Searcher, etc.) directly.
crate-type = ["staticlib", "rlib"]

[dependencies]
libc      = "0.2.180"
miette    = { workspace = true }
thiserror = { workspace = true }
