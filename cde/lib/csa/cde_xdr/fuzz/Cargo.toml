[package]
name = "cde_xdr-fuzz"
version = "0.0.1"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = { version = "0.4", features = ["arbitrary-derive"] }
cde_xdr = { path = ".." }

# Fuzz targets are separate binaries, not library targets.
[[bin]]
name = "fuzz_decode_arbitrary"
path = "fuzz_targets/fuzz_decode_arbitrary.rs"
test = false
doc = false

[[bin]]
name = "fuzz_roundtrip"
path = "fuzz_targets/fuzz_roundtrip.rs"
test = false
doc = false
