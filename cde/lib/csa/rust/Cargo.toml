[package]
name = "libcsa_xdr"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["staticlib", "rlib"]

[dependencies]
libc = "0.2"
cde_xdr = { path = "../cde_xdr" }

[build-dependencies]
cbindgen = "0.29"
bindgen = "0.72"
# We assume xdrgen is installed as a binary tool (cargo install xdrgen)

# [profile.release] is now defined at the workspace root (cde/Cargo.toml)

