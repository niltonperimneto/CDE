[package]
name = "libdtwm_parser"
version = "0.1.0"
edition = "2021"
description = "Memory-safe replacement for CDE dtwm's dtwmrc and front-panel parser"
license = "LGPL-2.0-or-later"

[lib]
name = "dtwm_parser"
crate-type = ["staticlib", "rlib"]

[dependencies]
libc        = { workspace = true }
miette      = { workspace = true }
pest        = { workspace = true }
pest_derive = { workspace = true }
thiserror   = { workspace = true }

[build-dependencies]
cbindgen = { workspace = true }
